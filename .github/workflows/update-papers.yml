name: Update paper data

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch arXiv papers
        run: python scripts/fetch_papers.py --max-results 12 --output public/data/papers.json --sleep 3 --timeout 12
      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update paper data"
          file_pattern: public/data/papers.json
